        '</div>' +
      '</div>';

    function amt() { return panel.querySelector('#ic-amt').value; }
    panel.querySelector('#ic-charge').onclick = function () {
      if (!amt()) return notify('warning', T('Enter an amount', 'Betrag eingeben'));
      invoke('/ic/charge', 'POST', { amount: amt() }).then(function () { openTab('ic', true); });
    };
    panel.querySelector('#ic-spend').onclick = function () {
      if (!amt()) return notify('warning', T('Enter an amount', 'Betrag eingeben'));
      invoke('/ic/spend', 'POST', { amount: amt() }).then(function (r) {
        if (r.yen < d.low_threshold) notify('warning', T('IC balance is low', 'IC-Guthaben ist niedrig'));
        openTab('ic', true);
      });
    };
    panel.querySelector('#ic-setbtn').onclick = function () {
      invoke('/ic/set', 'POST', { yen: panel.querySelector('#ic-set').value }).then(function () { openTab('ic', true); });
    };
  }

  // ---- 6. Food & collect -------------------------------------------------
  var FOOD_KINDS = [
    { k: 'famichiki', en: 'Famichiki', de: 'Famichiki' },
    { k: 'konbini', en: 'Konbini stop', de: 'Konbini-Stopp' },
    { k: 'ramen', en: 'Ramen', de: 'Ramen' },
    { k: 'sushi', en: 'Kaiten sushi', de: 'Kaiten-Sushi' },
    { k: 'gyoza', en: 'Gyoza', de: 'Gyoza' },
    { k: 'matcha', en: 'Matcha', de: 'Matcha' }
  ];
  var COLLECT_KINDS = [
    { k: 'onsen', en: 'Onsen', de: 'Onsen' },
    { k: 'goshuin', en: 'Goshuin', de: 'Goshuin' },
    { k: 'eki-stamp', en: 'Eki stamps', de: 'Eki-Stempel' }
  ];
  var REGION_ORDER = ['Hokkaido', 'Tohoku', 'Kanto', 'Chubu', 'Kansai', 'Chugoku', 'Shikoku', 'Kyushu', 'Okinawa'];

  // Food: just the konbini/ramen/… counters.
  var dishState = { q: '', cat: 'all' };
  SECTIONS.food = function (panel) {
    return Promise.all([
      invoke('/collect/state', 'GET'),
      invoke('/dishes', 'GET').catch(function () { return { cats: [], dishes: [] }; })
    ]).then(function (rr) {
      var d = rr[0] || {}, menu = rr[1] || { cats: [], dishes: [] };
      var foodCards = FOOD_KINDS.map(function (f) {
        var c = d.food[f.k] || 0;
        return '<div class="card" style="padding:12px"><div class="between"><div class="stat"><span class="v">' + c + '</span><span class="k">' + esc(T(f.en, f.de)) + '</span></div>' +
          '<div class="row"><button class="iconbtn" data-food="' + f.k + '" data-delta="-1">' + svg('minus') + '</button>' +
          '<button class="iconbtn" data-food="' + f.k + '" data-delta="1">' + svg('plus') + '</button></div></div></div>';
      }).join('');
      var SAY = canSpeak();
      function dishRows() {
        var q = dishState.q.toLowerCase();
        var list = (menu.dishes || []).filter(function (m) {
          if (dishState.cat !== 'all' && m.cat !== dishState.cat) return false;
          if (!q) return true;
          return (m.en + ' ' + m.de + ' ' + m.romaji + ' ' + m.jp + ' ' + m.key).toLowerCase().indexOf(q) >= 0;
        });
        return list.map(function (m) {
          var note = T(m.note_en, m.note_de);
          return '<div class="listrow" style="align-items:flex-start"><div style="flex:1">' +
            '<div><b>' + esc(m.jp) + '</b> <span class="jp">' + esc(m.romaji) + '</span></div>' +
            '<div class="muted" style="font-size:12.5px">' + esc(T(m.en, m.de)) + '</div>' +
            (note ? '<div class="faint" style="font-size:11px">' + esc(note) + '</div>' : '') + '</div>' +
            (SAY ? '<button class="iconbtn" data-say="' + esc(m.jp) + '" title="' + T('Play (ja)', 'Anhören (ja)') + '">' + svg('speaker') + '</button>' : '') + '</div>';
        }).join('') || '<div class="loading">' + T('No dishes match.', 'Keine Gerichte gefunden.') + '</div>';
      }
      var catChips = ['all'].concat(menu.cats || []).map(function (c) {
        return '<button class="chip" data-dcat="' + esc(c) + '" aria-pressed="' + (dishState.cat === c ? 'true' : 'false') + '">' + esc(c === 'all' ? T('All', 'Alle') : c) + '</button>';
      }).join('');
      panel.innerHTML =
        '<div class="card"><h2>' + svg('food') + T('Food tally', 'Food-Zähler') + '</h2>' +
          '<div class="muted" style="font-size:12.5px;margin:-4px 0 12px">' +
            T('Tap to count every konbini run, ramen bowl and kaiten plate.', 'Zähle jeden Konbini-Stopp, jede Ramen-Schale und jeden Kaiten-Teller.') + '</div>' +
          '<div class="grid cols3">' + foodCards + '</div></div>' +
        '<div class="card" style="margin-top:14px"><h2>' + svg('search') + T('Menu decoder', 'Menü-Decoder') + '</h2>' +
          '<div class="muted" style="font-size:12.5px;margin:-4px 0 8px">' + T('Look up a dish on the menu — what it is, and dietary notes.', 'Schlag ein Gericht auf der Karte nach — was es ist, plus Ernährungshinweise.') + '</div>' +
          '<input class="fld" id="dish-q" placeholder="' + T('Search dish (e.g. ramen, pork, sushi)', 'Gericht suchen (z.B. Ramen, Schwein, Sushi)') + '" value="' + esc(dishState.q) + '" />' +
          '<div class="wrap" style="margin:8px 0">' + catChips + '</div>' +
          '<div id="dish-list">' + dishRows() + '</div></div>';
      panel.querySelectorAll('[data-food]').forEach(function (b) {
        b.onclick = function () {
          invoke('/food/inc', 'POST', { kind: b.getAttribute('data-food'), delta: parseInt(b.getAttribute('data-delta'), 10) })
            .then(function () { openTab('food', true); });
        };
      });
      function refreshDishes() { var el = panel.querySelector('#dish-list'); if (el) el.innerHTML = dishRows(); wireSay(); reportHeight(); }
      function wireSay() { panel.querySelectorAll('[data-say]').forEach(function (el) { el.onclick = function () { speak(el.getAttribute('data-say')); }; }); }
      var dq = panel.querySelector('#dish-q'); if (dq) dq.oninput = function () { dishState.q = dq.value; refreshDishes(); };
      panel.querySelectorAll('[data-dcat]').forEach(function (b) { b.onclick = function () { dishState.cat = b.getAttribute('data-dcat'); panel.querySelectorAll('[data-dcat]').forEach(function (x) { x.setAttribute('aria-pressed', x.getAttribute('data-dcat') === dishState.cat ? 'true' : 'false'); }); refreshDishes(); }; });
      wireSay();
    });
  };

  // Passport: the 47-prefecture region grid + Onsen/Goshuin/Eki collections.
  SECTIONS.passport = function (panel) {
    return invoke('/collect/state', 'GET').then(function (d) {
      var visitedSet = {}; d.visited.forEach(function (v) { visitedSet[v] = true; });
      var visitedBy = d.visited_by || {};
      var byRegion = {};
      d.prefectures.forEach(function (p) { (byRegion[p.region] = byRegion[p.region] || []).push(p); });
      var mapHtml = REGION_ORDER.filter(function (r) { return byRegion[r]; }).map(function (r) {
        var tiles = byRegion[r].map(function (p) {
          var tip = p.romaji + (visitedSet[p.code] && visitedBy[p.code] ? ' — ' + visitedBy[p.code] : '');
          return '<div class="pref' + (visitedSet[p.code] ? ' on' : '') + '" data-pref="' + esc(p.code) + '" title="' + esc(tip) + '">' +
            '<div class="pc">' + esc(p.code.replace('JP-', '')) + '</div>' +
            '<div class="pn">' + esc(p.name) + '</div>' +
            '<div class="pj">' + esc(p.jp) + '</div></div>';
        }).join('');
        return '<div class="region"><div class="rname">' + esc(r) + '</div><div class="pref-grid">' + tiles + '</div></div>';
      }).join('');

      var collectHtml = COLLECT_KINDS.map(function (c) {
        var items = (d.collections[c.k] || []);
        var chips = items.map(function (it) {
          return '<span class="chip static" data-col="' + c.k + '" data-key="' + esc(it.key) + '" title="' + (it.by ? esc(it.by) : '') + '">' + esc(it.key) + '</span>';
        }).join('') || '<span class="faint" style="font-size:12px">' + T('none yet', 'noch keine') + '</span>';
        return '<div style="margin-bottom:12px"><div class="between" style="margin-bottom:6px"><span class="kicker">' + esc(T(c.en, c.de)) + ' (' + items.length + ')</span></div>' +
          '<div class="row" style="margin-bottom:6px"><input class="fld col-in" data-kind="' + c.k + '" placeholder="' + T('add name…', 'Name hinzufügen…') + '" />' +
          '<button class="btn sm col-add" data-kind="' + c.k + '">' + svg('plus') + '</button></div>' +
          '<div class="wrap">' + chips + '</div></div>';
      }).join('');

      panel.innerHTML =
        '<div class="grid cols2">' +
          '<div class="card"><h2>' + svg('grid') + T('Prefecture passport', 'Präfektur-Pass') + ' · ' + d.visited.length + '/' + d.prefectures.length + '</h2>' +
            '<div class="muted" style="font-size:12.5px;margin:-4px 0 12px">' + T('Tap a prefecture to stamp it as visited.', 'Tippe eine Präfektur an, um sie als besucht zu stempeln.') + '</div>' +
            '<div style="">' + mapHtml + '</div></div>' +
          '<div class="card"><h2>' + svg('star') + T('Collections', 'Sammlungen') + '</h2>' +
            '<div class="muted" style="font-size:12.5px;margin:-4px 0 12px">' + T('Log the onsen, goshuin and eki stamps you gather.', 'Sammle Onsen, Goshuin und Eki-Stempel.') + '</div>' +
            collectHtml + '</div>' +
        '</div>';

      panel.querySelectorAll('[data-pref]').forEach(function (b) {
        b.onclick = function () {
          invoke('/prefectures/toggle', 'POST', { code: b.getAttribute('data-pref') }).then(function () { openTab('passport', true); });
        };
      });
      panel.querySelectorAll('.col-add').forEach(function (b) {
        b.onclick = function () {
          var kind = b.getAttribute('data-kind');
          var inp = panel.querySelector('.col-in[data-kind="' + kind + '"]');
          if (!inp.value.trim()) return;
          invoke('/collect/add', 'POST', { kind: kind, key: inp.value.trim() }).then(function () { openTab('passport', true); });
        };
      });
      panel.querySelectorAll('[data-col]').forEach(function (chip) {
        chip.style.cursor = 'pointer'; chip.title = T('remove', 'entfernen');
        chip.onclick = function () {
          invoke('/collect/add', 'POST', { kind: chip.getAttribute('data-col'), key: chip.getAttribute('data-key') }).then(function () { openTab('passport', true); });
        };
      });
    });
  };

  // ---- 7. Season ---------------------------------------------------------
  SECTIONS.season = function (panel) {
    return invoke('/season', 'GET').then(function (d) {
      var months = d.trip_months;
      var sakura = d.sakura.slice().sort(function (a, b) { return (a.sakura_avg || '').localeCompare(b.sakura_avg || ''); });
      var sakuraRows = sakura.map(function (s) {
        var inWin = s.in_window || s.koyo_in_window;
        return '<tr' + (inWin ? ' style="background:var(--bg-hover)"' : '') + '>' +
          '<td><b>' + esc(s.city) + '</b>' + (s.pref_name ? ' <span class="faint" style="font-size:11px">' + esc(s.pref_name) + ' · ' + esc(s.region || '') + '</span>' : '') + '</td>' +
          '<td><span style="color:var(--sakura)">●</span> ' + mmdd(s.sakura_avg) + (s.in_window ? ' <span class="chip static" style="padding:1px 7px;font-size:10px">' + T('in dates', 'im Zeitraum') + '</span>' : '') + '</td>' +
          '<td>' + mmdd(s.koyo_avg) + (s.koyo_in_window ? ' <span class="chip static" style="padding:1px 7px;font-size:10px">' + T('in dates', 'im Zeitraum') + '</span>' : '') + '</td></tr>';
      }).join('');

      // Only show matsuri that fall within the trip's month window (fall back to
      // all only when the trip has no dates).
      var mlist = months ? d.matsuri.filter(function (m) { return m.in_window; }) : d.matsuri.slice(0, 40);
      var matsuriCards = mlist.map(function (m, i) {
        var tags = '';
        if (m.nearby) tags += '<span class="chip static">' + T('nearby a visited prefecture', 'nahe besuchter Präfektur') + '</span>';
        var loc = esc(m.city) + (m.pref_name ? ' · ' + esc(m.pref_name) : '') + (m.region ? ' · ' + esc(m.region) : '');
        return '<div style="padding:10px 0;border-top:1px solid var(--border-faint)">' +
          '<div class="between"><div><b>' + esc(m.name) + '</b> <span class="jp">' + esc(m.name_jp) + '</span></div>' +
          '<span class="chip static">' + monthName(m.month) + '</span></div>' +
          '<div class="faint" style="font-size:11px;margin-top:2px">' + loc + '</div>' +
          '<div class="muted" style="font-size:12.5px;margin-top:3px">' + esc(T(m.blurb_en, m.blurb_de)) + '</div>' +
          '<div class="between" style="margin-top:7px"><div class="wrap">' + tags + '</div>' +
          '<button class="btn sec sm mplan" data-i="' + i + '">' + svg('plus') + ' ' + T('Add to planner', 'Zum Planer') + '</button></div></div>';
      }).join('') || '<div class="loading">' + (months ? T('No matsuri fall within your travel dates.', 'Keine Matsuri in deinem Reisezeitraum.') : T('Set trip dates to see matsuri in your window.', 'Setze Reisedaten, um Matsuri im Zeitraum zu sehen.')) + '</div>';

      var windowLine = months
        ? T('Only events during your dates: ', 'Nur Events in deinem Zeitraum: ') + months.map(monthName).join(', ')
        : T('Set trip dates to see events in your window.', 'Setze Reisedaten, um Events im Zeitraum zu sehen.');

      panel.innerHTML =
        '<div class="grid cols2">' +
          '<div class="card"><h2>' + svg('season') + T('Sakura & kōyō', 'Sakura & Kōyō') + '</h2>' +
            '<div class="muted" style="font-size:12.5px;margin:-4px 0 10px">' + T('Average full-bloom (cherry) and peak-colour (autumn) dates. Rows in your travel window are highlighted.', 'Durchschnittliche Vollblüte (Kirsche) und Farbhöhepunkt (Herbst). Zeilen in deinem Reisezeitraum sind hervorgehoben.') + '</div>' +
            '<div class="scrollx" style=""><table class="tbl"><thead><tr><th>' + T('City', 'Stadt') + '</th><th>' + T('Sakura (bloom)', 'Sakura (Blüte)') + '</th><th>' + T('Kōyō (autumn)', 'Kōyō (Herbst)') + '</th></tr></thead><tbody>' + sakuraRows + '</tbody></table></div></div>' +
          '<div class="card"><h2>' + svg('season') + T('Matsuri & hanabi', 'Matsuri & Hanabi') + '</h2>' +
            '<div class="foot" style="margin:0 0 6px">' + esc(windowLine) + ' · ' + T('“Add to planner” drops a located place into the trip.', '„Zum Planer“ legt einen verorteten Ort in der Reise an.') + '</div>' +
            '<div style="">' + matsuriCards + '</div></div>' +
        '</div>';

      panel.querySelectorAll('.mplan').forEach(function (b) {
        b.onclick = function () {
          var m = mlist[parseInt(b.getAttribute('data-i'), 10)]; if (!m) return;
          b.disabled = true; b.innerHTML = svg('check') + ' ' + T('Added', 'Hinzugefügt');
          var loc = m.city + (m.pref_name ? ', ' + m.pref_name : '') + (m.region ? ' (' + m.region + ')' : '');
          var richNotes = monthName(m.month) + ' · ' + loc + ' — ' + T(m.blurb_en, m.blurb_de);
          invoke('/itinerary/add', 'POST', { name: m.name + ' — ' + monthName(m.month), notes: richNotes, city: m.city, month: m.month, tag: T('Matsuri', 'Matsuri') + ' · ' + monthName(m.month) })
            .then(function (r) { notify('success', r && r.located ? T('Added & located in the planner', 'Verortet zum Planer hinzugefügt') : T('Added to the trip planner', 'Zum Reise-Planer hinzugefügt')); })
            .catch(function (e) { b.disabled = false; b.innerHTML = svg('plus') + ' ' + T('Add to planner', 'Zum Planer'); notify('error', e.message || T('Add failed', 'Hinzufügen fehlgeschlagen')); });
        };
      });
    });
  };

  // ---- 8. Safety & weather ----------------------------------------------
  SECTIONS.safety = function (panel) {
    return Promise.all([
      invoke('/safety', 'GET'),
      invoke('/news', 'GET').catch(function () { return { items: [] }; })
    ]).then(function (rr) {
      var d = rr[0] || {}, news = rr[1] || { items: [] };
      var loc = d.location || {};
      var w = d.weather;
      var weatherHtml;
      if (!w) {
        weatherHtml = '<div class="muted">' + T('Set weather latitude & longitude in Settings.', 'Setze Wetter-Breiten-/Längengrad in den Einstellungen.') + '</div>';
      } else {
        var cur = w.current || {};
        var days = (w.daily || []).map(function (dd) {
          return '<div class="stat" style="min-width:78px"><span class="k">' + esc(dd.date ? dd.date.slice(5) : '') + '</span>' +
            '<span class="v" style="font-size:15px">' + (dd.tmax != null ? Math.round(dd.tmax) + '°' : '—') + '<span class="faint" style="font-size:12px"> / ' + (dd.tmin != null ? Math.round(dd.tmin) + '°' : '—') + '</span></span>' +
            '<span class="k">' + esc(wcode(dd.code)) + (dd.pop != null ? ' · ' + dd.pop + '%' : '') + '</span></div>';
        }).join('');
        weatherHtml =
          '<div class="row"><span style="color:var(--warning)">' + svg('sun') + '</span>' +
          '<span class="big" style="font-size:32px">' + (cur.temp != null ? Math.round(cur.temp) + '°' : '—') + '</span>' +
          '<div><div>' + esc(wcode(cur.code)) + '</div><div class="faint">' + (cur.humidity != null ? cur.humidity + '% · ' : '') + (cur.wind != null ? cur.wind + ' km/h' : '') + '</div></div></div>' +
          '<div class="wrap" style="margin-top:12px">' + days + '</div>';
      }
      var locLabel = loc.city ? esc(loc.city) : (loc.lat != null ? loc.lat.toFixed(2) + ', ' + loc.lon.toFixed(2) : T('not set', 'nicht gesetzt'));

      var quakeRows = (d.quakes || []).slice(0, 10).map(function (q) {
        return '<tr><td class="num"><b>M ' + (q.mag != null ? q.mag : '—') + '</b></td>' +
          '<td>' + esc(q.place || '') + '</td>' +
          '<td class="faint">' + (q.intensity ? T('int. ', 'Int. ') + esc(q.intensity) : '') + '</td>' +
          '<td class="faint">' + esc((q.time || '').replace('T', ' ').slice(0, 16)) + '</td></tr>';
      }).join('') || '<tr><td colspan="4" class="faint">' + T('No recent quakes / data unavailable', 'Keine aktuellen Beben / keine Daten') + '</td></tr>';

      var emg = (d.emergency || []).map(function (p) {
        return '<div class="listrow" style="align-items:flex-start"><div style="flex:1"><b>' + esc(p.jp) + '</b> <span class="jp">' + esc(p.romaji) + '</span>' +
          '<div class="muted" style="font-size:12px">' + esc(T(p.en, p.de)) + '</div></div></div>';
      }).join('');

      var newsRows = (news.items || []).slice(0, 8).map(function (n) {
        return '<div class="listrow" style="align-items:flex-start"><span style="color:var(--text-faint)">' + svg('globe') + '</span>' +
          '<span style="flex:1"><span class="lnk" data-ext="' + esc(n.link || '') + '">' + esc(n.title) + '</span>' +
          (n.date ? '<div class="faint" style="font-size:11px">' + esc(String(n.date).replace(/\s*\+.*/, '').replace(/^[A-Za-z]{3},\s*/, '')) + '</div>' : '') + '</span></div>';
      }).join('') || '<div class="faint" style="font-size:12px">' + T('News feed unavailable right now.', 'News-Feed gerade nicht verfügbar.') + '</div>';

      panel.innerHTML =
        '<div class="grid cols2">' +
          '<div class="card"><h2>' + svg('sun') + T('Weather', 'Wetter') + ' · ' + locLabel + '</h2>' + weatherHtml +
            '<div class="foot">' + T('Open-Meteo · updated', 'Open-Meteo · aktualisiert') + ' ' + ago(d.weather_fetched_at) + '</div></div>' +
          '<div class="card"><h2>' + svg('wave') + T('Recent earthquakes', 'Aktuelle Erdbeben') + '</h2>' +
            '<div class="scrollx"><table class="tbl"><thead><tr><th>Mag</th><th>' + T('Place', 'Ort') + '</th><th></th><th>' + T('Time', 'Zeit') + '</th></tr></thead><tbody>' + quakeRows + '</tbody></table></div>' +
            '<div class="foot">' + T('JMA · updated', 'JMA · aktualisiert') + ' ' + ago(d.quake_fetched_at) + '</div></div>' +
        '</div>' +
        '<div class="grid cols2" style="margin-top:14px">' +
          '<div class="card"><h2>' + svg('globe') + T('Latest Japan news', 'Aktuelle Japan-News') + '</h2>' +
            '<div class="muted" style="font-size:12px;margin:-4px 0 6px">' + T('English headlines, refreshed regularly. Tap to open the article.', 'Englische Schlagzeilen, regelmäßig aktualisiert. Zum Öffnen antippen.') + '</div>' +
            newsRows +
            '<div class="foot">' + esc(news.source || 'Japan Today') + (news.fetched_at ? ' · ' + T('updated', 'aktualisiert') + ' ' + ago(news.fetched_at) : '') + '</div></div>' +
          '<div class="card"><h2>' + svg('shield') + T('Emergency phrases', 'Notfall-Phrasen') + '</h2>' +
            '<div class="banner warn" style="margin-bottom:10px">' + T('Police 110 · Fire/Ambulance 119', 'Polizei 110 · Feuer/Krankenwagen 119') + '</div>' + emg + '</div>' +
        '</div>';

      panel.querySelectorAll('.lnk[data-ext]').forEach(function (el) {
        var u = el.getAttribute('data-ext'); if (!u) return;
        el.title = T('Open article', 'Artikel öffnen'); el.onclick = function () { openUrl(u); };
      });
    });
  };

  // ---- Settings ----------------------------------------------------------
  SECTIONS.settings = function (panel) {
    return invoke('/prefs', 'GET').then(function (d) {
      var p = d.prefs || {};
      var tp = d.trip_prefs || {};
      function opt(v, cur) { return '<option value="' + v + '"' + (cur === v ? ' selected' : '') + '>' + v + '</option>'; }
      panel.innerHTML =
        '<div class="grid cols2">' +
          '<div class="card"><h2>' + svg('settings') + T('Personal', 'Persönlich') + '</h2>' +
            '<div class="muted" style="font-size:12.5px;margin:-4px 0 12px">' + T('Only you see these.', 'Nur du siehst diese.') + '</div>' +
            '<label class="lbl">' + T('Home currency', 'Heimatwährung') + '</label><select class="fld" id="s-cur">' +
              ['EUR', 'USD', 'GBP', 'CHF'].map(function (c) { return opt(c, p.home_currency); }).join('') + '</select>' +
            '<label class="lbl" style="margin-top:10px">' + T('IC card', 'IC-Karte') + '</label><select class="fld" id="s-ic">' +
              ['', 'Suica', 'Pasmo', 'ICOCA', 'Andere'].map(function (c) { return '<option value="' + c + '"' + (p.ic_card === c ? ' selected' : '') + '>' + (c || '—') + '</option>'; }).join('') + '</select>' +
            '<label class="lbl" style="margin-top:10px">' + T('Low IC warning (¥)', 'IC-Warnung (¥)') + '</label><input class="fld" id="s-low" type="number" value="' + esc(p.low_ic_threshold || '') + '" />' +
          '</div>' +
          '<div class="card"><h2>' + svg('sun') + T('Trip weather location', 'Wetter-Ort der Reise') + '</h2>' +
            '<div class="muted" style="font-size:12.5px;margin:-4px 0 12px">' + T('Shared with all trip members — drives the Safety tab.', 'Geteilt mit allen Reise-Mitgliedern — steuert den Sicherheits-Tab.') + '</div>' +
            '<label class="lbl">' + T('Search a Japanese city', 'Japanische Stadt suchen') + '</label>' +
            '<input class="fld" id="s-search" placeholder="' + T('type e.g. Kyoto…', 'z.B. Kyoto…') + '" autocomplete="off" />' +
            '<div id="s-results" style="margin-top:4px"></div>' +
            '<div class="divider"></div>' +
            '<label class="lbl">' + T('City (label)', 'Stadt (Label)') + '</label><input class="fld" id="s-city" value="' + esc(tp.weather_city || '') + '" placeholder="Tokyo" />' +
            '<div class="row" style="margin-top:10px"><div style="flex:1"><label class="lbl">' + T('Latitude', 'Breitengrad') + '</label><input class="fld" id="s-lat" type="number" step="any" value="' + esc(tp.weather_lat || '') + '" placeholder="35.68" /></div>' +
            '<div style="flex:1"><label class="lbl">' + T('Longitude', 'Längengrad') + '</label><input class="fld" id="s-lon" type="number" step="any" value="' + esc(tp.weather_lon || '') + '" placeholder="139.76" /></div></div>' +
            '<div class="faint" style="font-size:11px;margin-top:6px">' + T('Pick a city above to fill these automatically, then Save.', 'Wähle oben eine Stadt, um diese automatisch zu füllen, dann Speichern.') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="card" style="margin-top:14px"><h2>' + svg('yen') + T('Trip integration', 'Reise-Integration') + '</h2>' +
          '<div class="muted" style="font-size:12.5px;margin:-4px 0 10px">' + T('Write into the TREK trip itself (needs your trip-edit permission).', 'Direkt in die TREK-Reise schreiben (benötigt deine Trip-Bearbeitungsrechte).') + '</div>' +
          '<div class="wrap"><button class="btn sec" id="s-cur-jpy">' + T('Set trip currency to JPY (¥)', 'Reisewährung auf JPY (¥) setzen') + '</button>' +
          '<button class="btn sec" id="s-mute">' + (tp.warnings_muted === '1' ? T('Show planner warnings', 'Planer-Warnungen zeigen') : T('Mute planner warnings', 'Planer-Warnungen stummschalten')) + '</button></div>' +
          '<div class="faint" style="font-size:11px;margin-top:8px">' + T('Muting hides this plugin’s warning bars (weather, budget, Golden Week…) from the trip planner.', 'Stummschalten blendet die Warn-Bars dieses Plugins (Wetter, Budget, Golden Week…) im Planer aus.') + '</div></div>' +
        '<div class="row" style="margin-top:14px"><button class="btn" id="s-save">' + T('Save preferences', 'Einstellungen speichern') + '</button>' +
        '<span class="faint" style="font-size:12px">' + T('Personal settings are per user; the weather location is shared with the trip.', 'Persönliches ist pro Nutzer; der Wetter-Ort gilt für die ganze Reise.') + '</span></div>';

      // City search → fills city/lat/lon
      var si = panel.querySelector('#s-search'); var res = panel.querySelector('#s-results'); var stmr;
      function renderResults(list) {
        if (!list || !list.length) { res.innerHTML = ''; return; }
        res.innerHTML = list.map(function (r, i) {
          return '<div class="listrow s-pick" data-i="' + i + '" style="cursor:pointer;padding:6px 4px"><span style="flex:1">' + esc(r.name) + (r.pref ? ' <span class="faint" style="font-size:11px">' + esc(r.pref) + '</span>' : '') + '</span><span class="faint" style="font-size:11px">' + r.lat.toFixed(2) + ', ' + r.lon.toFixed(2) + '</span></div>';
        }).join('');
        res.querySelectorAll('.s-pick').forEach(function (row) {
          row.onclick = function () {
            var r = list[parseInt(row.getAttribute('data-i'), 10)];
            panel.querySelector('#s-city').value = r.name.replace(/\s*\(.*\)\s*/, '');
            panel.querySelector('#s-lat').value = r.lat;
            panel.querySelector('#s-lon').value = r.lon;
            res.innerHTML = ''; si.value = '';
            notify('info', T('Filled — click Save to apply', 'Übernommen — zum Anwenden Speichern klicken'));
          };
        });
      }
      si.oninput = function () {
        clearTimeout(stmr); var q = si.value.trim();
        if (!q) { res.innerHTML = ''; return; }
        stmr = setTimeout(function () {
          invoke('/geocode?q=' + encodeURIComponent(q), 'GET').then(function (g) { renderResults(g.results || []); reportHeight(); }).catch(function () {});
        }, 200);
      };

      panel.querySelector('#s-save').onclick = function () {
        var prefs = {
          home_currency: panel.querySelector('#s-cur').value,
          ic_card: panel.querySelector('#s-ic').value,
          low_ic_threshold: panel.querySelector('#s-low').value
        };
        var trip_prefs = {
          weather_city: panel.querySelector('#s-city').value,
          weather_lat: panel.querySelector('#s-lat').value,
          weather_lon: panel.querySelector('#s-lon').value
        };
        invoke('/prefs', 'POST', { prefs: prefs, trip_prefs: trip_prefs }).then(function () {
          notify('success', T('Preferences saved', 'Einstellungen gespeichert'));
          sectionCache = {};
        }).catch(function (e) { notify('error', e.message); });
      };
      panel.querySelector('#s-cur-jpy').onclick = function () {
        invoke('/trip/currency', 'POST', {}).then(function (r) { notify('success', T('Trip currency set to', 'Reisewährung gesetzt auf') + ' ' + ((r && r.currency) || 'JPY')); })
          .catch(function (e) { notify('error', e.message || T('Not permitted', 'Nicht erlaubt')); });
      };
      panel.querySelector('#s-mute').onclick = function () {
        var muted = tp.warnings_muted === '1';
        invoke('/prefs', 'POST', { trip_prefs: { warnings_muted: muted ? '0' : '1' } }).then(function () {
          notify('success', muted ? T('Planner warnings shown', 'Planer-Warnungen aktiviert') : T('Planner warnings muted', 'Planer-Warnungen stummgeschaltet'));
          sectionCache = {}; openTab('settings', true);
        }).catch(function (e) { notify('error', e.message); });
      };
    });
  };

  // ---- start -------------------------------------------------------------
  post({ type: 'trek:ready' });
  // Fallback: if no context arrives (older host / harness quirk), boot anyway.
  setTimeout(function () { if (!booted) { ctx.theme = null; document.documentElement.dataset.theme = resolveTheme({}); booted = true; boot(); } }, 800);
})();
</script>
</body>
</html>
