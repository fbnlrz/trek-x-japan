<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TREK × Japan</title>
<style>
  /* Light is the pre-context default; OS preference applies before context. */
  :root {
    color-scheme: light;
    --bg-page: #f6f6f7;
    --bg-card: #ffffff;
    --bg-hover: rgba(0,0,0,0.03);
    --bg-sunken: #f2f2f4;
    --text-primary: #111827;
    --text-secondary: #374151;
    --text-muted: #6b7280;
    --text-faint: #9ca3af;
    --border-faint: rgba(0,0,0,0.08);
    --accent: #111827;
    --accent-text: #ffffff;
    --accent-hover: #1f2937;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #b45309;
    --sakura: #e28aa6;
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --shadow-card: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
    --font-system: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg-page: #0d0d10;
    --bg-card: #131316;
    --bg-hover: rgba(255,255,255,0.06);
    --bg-sunken: #1a1a1f;
    --text-primary: #f4f4f5;
    --text-secondary: #d4d4d8;
    --text-muted: #a1a1aa;
    --text-faint: #71717a;
    --border-faint: rgba(255,255,255,0.09);
    --accent: #e4e4e7;
    --accent-text: #09090b;
    --accent-hover: #d4d4d8;
    --success: #22c55e;
    --danger: #ef4444;
    --warning: #f59e0b;
    --sakura: #f0a9c0;
    --shadow-card: 0 1px 3px rgba(0,0,0,.4), 0 1px 2px rgba(0,0,0,.3);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme]) {
      color-scheme: dark;
      --bg-page: #0d0d10; --bg-card: #131316; --bg-hover: rgba(255,255,255,0.06);
      --bg-sunken: #1a1a1f; --text-primary: #f4f4f5; --text-secondary: #d4d4d8;
      --text-muted: #a1a1aa; --text-faint: #71717a; --border-faint: rgba(255,255,255,0.09);
      --accent: #e4e4e7; --accent-text: #09090b; --accent-hover: #d4d4d8;
      --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --sakura: #f0a9c0;
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: var(--font-system);
    background: var(--bg-page);
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  /* Fixed-height shell: header+tabs pinned, content scrolls internally. This
     works whether the host grows the iframe (trek:resize) or clips it. */
  #root { height: 100%; display: flex; flex-direction: column; min-height: 0; }
  .appbar { flex: none; background: var(--bg-page); border-bottom: 1px solid var(--border-faint); }
  #scroller { flex: 1 1 auto; min-height: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  /* Full-page plugins fill their host container (per the TREK plugin contract),
     so we do NOT cap the width here — the host owns it. Content stays readable
     because the section grids are responsive (auto-fit), adding columns rather
     than stretching. Only a small gutter is kept for hosts that render flush. */
  .wrapmax { width: 100%; padding: 0 12px; }
  .appbar .wrapmax { padding-top: 18px; }
  #scroller .wrapmax { padding-top: 16px; padding-bottom: 44px; }

  /* Header */
  .hdr { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .hdr .mark { width: 34px; height: 34px; color: var(--accent); flex: none; }
  .hdr h1 { font-size: 19px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  .hdr .sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  /* Tabs */
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; padding-bottom: 12px; }
  .tab { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px;
    border: 1px solid transparent; border-radius: var(--radius-sm); background: none;
    color: var(--text-muted); font-family: inherit; font-size: 12.5px; font-weight: 550;
    cursor: pointer; transition: transform .18s cubic-bezier(.23,1,.32,1), background-color .18s, color .18s, border-color .18s; }
  .tab svg { width: 16px; height: 16px; }
  .tab:hover { background: var(--bg-hover); color: var(--text-secondary); }
  .tab[aria-selected="true"] { background: var(--accent); color: var(--accent-text); }
  .tab:not(:disabled):active { transform: scale(.97); }
  .tabsep { width: 1px; align-self: stretch; margin: 2px 4px; background: var(--border-faint); }

  /* Cards */
  /* align-items:start so a short card never stretches to match a taller
     neighbour (no more big empty gaps below the countdown/verdict cards). */
  .grid { display: grid; gap: 14px; align-items: start; }
  .grid.cols2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
  /* Masonry: cards of different heights pack tightly across the full width
     instead of leaving big gaps in a rigid 2-column grid on wide monitors. */
  .masonry { column-gap: 14px; column-count: 1; }
  .masonry > * { break-inside: avoid; -webkit-column-break-inside: avoid; margin: 0 0 14px; width: 100%; }
  @media (min-width: 680px) { .masonry { column-count: 2; } }
  @media (min-width: 1120px) { .masonry { column-count: 3; } }
  @media (min-width: 1640px) { .masonry { column-count: 4; } }

  /* ===== Dashboard widgets: bento grid of compact tiles ===== */
  .bento { display: grid; gap: 12px; grid-template-columns: repeat(2, 1fr); grid-auto-rows: 150px; grid-auto-flow: row dense; }
  @media (min-width: 640px)  { .bento { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1080px) { .bento { grid-template-columns: repeat(6, 1fr); } }
  .bento .w2 { grid-column: span 2; } .bento .w3 { grid-column: span 3; }
  .bento .h2 { grid-row: span 2; }
  @media (max-width: 639px) { .bento .w3 { grid-column: span 2; } }
  .wt { background: var(--bg-card); border: 1px solid var(--border-faint); border-radius: var(--radius-lg);
    padding: 14px 15px; box-shadow: var(--shadow-card); overflow: hidden; display: flex; flex-direction: column;
    min-width: 0; text-align: left; }
  .wt.link { cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
  .wt.link:hover { transform: translateY(-2px); box-shadow: 0 2px 4px rgba(0,0,0,.06), 0 14px 30px rgba(0,0,0,.10); }
  .wt.link:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .wt.accentbg { background: linear-gradient(155deg, color-mix(in srgb, var(--accent) 15%, var(--bg-card)), var(--bg-card) 68%); }
  .wt.scroll { overflow-y: auto; }
  .wth { display: flex; align-items: center; gap: 7px; color: var(--text-muted); margin-bottom: 9px; flex: none; }
  .wth svg { width: 14px; height: 14px; color: var(--accent); }
  .wth .lbl { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
  .wth .rt { margin-left: auto; font-size: 10.5px; color: var(--text-faint); font-weight: 600; }
  .wbig { font-size: 40px; font-weight: 760; letter-spacing: -.03em; line-height: 1; font-variant-numeric: tabular-nums; }
  .wbig small { font-size: 14px; font-weight: 600; color: var(--text-muted); letter-spacing: 0; }
  .wkick { font-size: 10.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--text-faint); margin-top: 5px; }
  .wmeta { font-size: 11.5px; color: var(--text-muted); margin-top: auto; padding-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wbar { height: 7px; border-radius: 99px; background: var(--bg-sunken); overflow: hidden; margin-top: 7px; }
  .wbar > span { display: block; height: 100%; background: var(--accent); }
  .wstat { display: flex; gap: 14px; } .wstat .s { display: flex; flex-direction: column; }
  .wstat .v { font-size: 19px; font-weight: 720; font-variant-numeric: tabular-nums; }
  .wstat .k { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text-faint); }
  .wpref { display: grid; grid-template-columns: repeat(auto-fill, minmax(12px, 1fr)); gap: 3px; margin-top: 8px; }
  .wpref i { aspect-ratio: 1; border-radius: 3px; background: var(--bg-sunken); }
  .wpref i.on { background: var(--accent); }
  .wjp { font-size: 17px; font-weight: 650; letter-spacing: .01em; }
  .wli { font-size: 12px; padding: 5px 0; border-top: 1px solid var(--border-faint); color: var(--text-secondary); }
  .wli:first-child { border-top: 0; }
  .wt.scroll::-webkit-scrollbar { width: 7px; }
  .wt.scroll::-webkit-scrollbar-thumb { background: var(--border-faint); border-radius: 99px; }
  .grid.cols3 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .card { background: var(--bg-card); border: 1px solid var(--border-faint);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: 16px 16px; }
  .card h2 { font-size: 12px; font-weight: 650; text-transform: uppercase; letter-spacing: .04em;
    color: var(--text-muted); margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .card h2 svg { width: 15px; height: 15px; }
  .card .foot { margin-top: 12px; font-size: 11px; color: var(--text-faint); }

  /* Buttons */
  button.btn { border: none; border-radius: var(--radius-sm); background: var(--accent);
    color: var(--accent-text); padding: 6px 14px; font-family: inherit; font-size: 12px;
    font-weight: 600; cursor: pointer;
    transition: transform .18s cubic-bezier(.23,1,.32,1), background-color .18s, opacity .18s; }
  button.btn:not(:disabled):active { transform: scale(.97); transition-duration: 80ms; }
  button.btn.sec { background: none; border: 1px solid var(--border-faint); color: var(--text-secondary); }
  button.btn.sm { padding: 4px 10px; font-size: 11px; }
  button.btn:disabled { opacity: .5; cursor: default; }
  .iconbtn { border: 1px solid var(--border-faint); background: none; color: var(--text-secondary);
    width: 30px; height: 30px; border-radius: var(--radius-sm); cursor: pointer; display: inline-flex;
    align-items: center; justify-content: center; transition: transform .12s, background-color .18s; }
  .iconbtn svg { width: 15px; height: 15px; }
  /* Constrain icons everywhere they aren't explicitly sized (buttons, chips,
     table cells) so an unsized inline SVG never balloons to its default box. */
  button.btn svg { width: 14px; height: 14px; vertical-align: -2px; }
  button.btn.sm svg { width: 13px; height: 13px; }
  .chip svg { width: 12px; height: 12px; vertical-align: -1px; }
  td svg, .listrow svg { width: 14px; height: 14px; }
  .banner svg { width: 14px; height: 14px; vertical-align: -2px; flex: none; }
  /* Safety net: any inline icon that slips through a specific rule stays small
     instead of ballooning to fill its container. */
  .card svg, .wt svg { max-width: 22px; max-height: 22px; }
  .iconbtn:active { transform: scale(.94); }

  input.fld, select.fld { width: 100%; padding: 7px 10px; border-radius: var(--radius-sm);
    border: 1px solid var(--border-faint); background: var(--bg-sunken); color: var(--text-primary);
    font-family: inherit; font-size: 13px; }
  input.fld:focus, select.fld:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  label.lbl { display: block; font-size: 11px; color: var(--text-muted); margin: 0 0 4px; font-weight: 550; }

  .kicker { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--text-faint); }
  .big { font-size: 40px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .num { font-variant-numeric: tabular-nums; }
  .muted { color: var(--text-muted); }
  .faint { color: var(--text-faint); }
  .jp { font-size: 12px; color: var(--text-muted); }
  .row { display: flex; align-items: center; gap: 8px; }
  .between { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .wrap { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px;
    background: var(--bg-hover); color: var(--text-secondary); font-size: 11.5px; border: 1px solid transparent; cursor: pointer; }
  .chip[aria-pressed="true"] { background: var(--accent); color: var(--accent-text); }
  .chip.static { cursor: default; }

  .listrow { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-top: 1px solid var(--border-faint); }
  .listrow:first-of-type { border-top: none; }
  .check { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid var(--text-faint);
    flex: none; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent-text); }
  .check.on { background: var(--success); border-color: var(--success); }
  .check svg { width: 13px; height: 13px; opacity: 0; }
  .check.on svg { opacity: 1; }

  .progress { height: 8px; border-radius: 999px; background: var(--bg-sunken); overflow: hidden; }
  .progress > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; transition: width .3s; }

  table.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.tbl th { text-align: left; font-weight: 600; color: var(--text-muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: .03em; padding: 6px 8px; border-bottom: 1px solid var(--border-faint); }
  table.tbl td { padding: 7px 8px; border-bottom: 1px solid var(--border-faint); vertical-align: top; }
  .scrollx { overflow-x: auto; }

  /* Prefecture passport (region-grouped tile grid — no raster) */
  .region { margin-bottom: 12px; }
  .region .rname { font-size: 11px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
  .pref-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .pref { width: 62px; padding: 6px 4px; border-radius: var(--radius-sm); border: 1px solid var(--border-faint);
    background: var(--bg-card); cursor: pointer; text-align: center; transition: transform .12s, background-color .2s, border-color .2s; }
  .pref:active { transform: scale(.95); }
  .pref .pc { font-size: 9px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .pref .pn { font-size: 10.5px; font-weight: 550; color: var(--text-secondary); line-height: 1.15; }
  .pref .pj { font-size: 9px; color: var(--text-faint); }
  .pref.on { background: var(--accent); border-color: var(--accent); }
  .pref.on .pc, .pref.on .pn, .pref.on .pj { color: var(--accent-text); }

  /* Shared pinned note — shown prominently at the top of the hub for everyone. */
  .pinnote { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; margin-bottom: 14px;
    border-radius: var(--radius-md); background: color-mix(in srgb, var(--accent) 12%, transparent);
    border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent); }
  .pinnote svg { width: 16px; height: 16px; color: var(--accent); flex: none; margin-top: 1px; }
  .pinnote .pt { flex: 1; min-width: 0; }
  .pinnote .pk { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
  .pinnote .pv { font-size: 14px; color: var(--text); white-space: pre-wrap; word-break: break-word; margin-top: 2px; }
  .pinnote .pb { font-size: 11px; color: var(--text-faint); margin-top: 3px; }
  /* Motion: content rises/fades in as a tab renders. Honours reduced motion. */
  @keyframes tj-rise { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: none; } }
  .stagger > * { animation: tj-rise .34s ease both; }
  .stagger > *:nth-child(2) { animation-delay: .04s; }
  .stagger > *:nth-child(3) { animation-delay: .08s; }
  .stagger > *:nth-child(4) { animation-delay: .12s; }
  .stagger > *:nth-child(5) { animation-delay: .16s; }
  .stagger > *:nth-child(n+6) { animation-delay: .19s; }
  @media (prefers-reduced-motion: reduce) { .stagger > * { animation: none; } }
  :root[data-reduce-motion] .stagger > * { animation: none; }
  /* Clickable affordance for external links (maps, sources). */
  .lnk { cursor: pointer; }
  .lnk:hover { color: var(--accent); }
  /* Compact icon button (speaker, external). */
  .iconbtn { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px;
    border-radius: 8px; border: 1px solid var(--border-faint); background: transparent; color: var(--text-muted);
    cursor: pointer; flex: none; padding: 0; }
  .iconbtn:hover { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, var(--border-faint)); }
  .iconbtn svg { width: 14px; height: 14px; }
  /* Reservation row (native TREK bookings). */
  .resv { display: flex; align-items: flex-start; gap: 10px; padding: 9px 4px; border-top: 1px solid var(--border-faint); }
  .resv:first-child { border-top: 0; }
  .resv .rt { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text-faint);
    border: 1px solid var(--border-faint); border-radius: 6px; padding: 2px 7px; flex: none; margin-top: 1px; min-width: 54px; text-align: center; }
  .resv .rd { font-size: 11px; color: var(--text-faint); margin-top: 2px; }
  .resv svg { width: 16px; height: 16px; flex: none; color: var(--text-muted); }
  .banner { padding: 10px 12px; border-radius: var(--radius-md); font-size: 12.5px; }
  .banner.warn { background: rgba(180,83,9,.12); color: var(--warning); border: 1px solid rgba(180,83,9,.3); }
  .banner.ok { background: rgba(22,163,74,.12); color: var(--success); border: 1px solid rgba(22,163,74,.3); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat .v { font-size: 22px; font-weight: 680; font-variant-numeric: tabular-nums; letter-spacing: -.01em; }
  .stat .k { font-size: 11px; color: var(--text-muted); }
  .divider { height: 1px; background: var(--border-faint); margin: 12px 0; }
  .loading { color: var(--text-faint); font-size: 13px; padding: 24px 0; text-align: center; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border-faint); border-top-color: var(--accent);
    border-radius: 50%; display: inline-block; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div id="root" aria-live="polite"></div>
<script>
"use strict";
(function () {
  // ---- bridge ------------------------------------------------------------
  var ctx = { theme: null, locale: 'en', tripId: null, userId: null };
  var pending = {}; var reqSeq = 0;

  function post(msg) { window.parent.postMessage(msg, '*'); }
  // Client-side concurrency gate. Each route handler on the plugin fans out to
  // several host RPC calls (requireTrip alone = getById + trip_cache upsert), and
  // the host caps a plugin at 16 in-flight RPCs. A page like the dashboard that
  // fires ~12 routes at once would blow past that cap — the host then refuses the
  // overflow, surfacing as sporadic 403 (a refused getById) / 500 (a refused
  // db.query) across unrelated routes. Capping in-flight *routes* here keeps the
  // downstream RPC fan-out comfortably under the host limit.
  var MAX_INFLIGHT = 4; var inflight = 0; var queue = [];
  function pump() {
    while (inflight < MAX_INFLIGHT && queue.length) {
      var job = queue.shift(); inflight++;
      invokeRaw(job.sub, job.method, job.body).then(job.resolve, job.reject)
        .then(function () { inflight--; pump(); });
    }
  }
  // This is a trip-page: tripId is always known from trek:context. Inject it
  // into every call so trip-scoped routes get their (membership-checked) trip;
  // personal routes simply ignore it.
  function invokeRaw(sub, method, body) {
    method = method || 'GET';
    if (ctx.tripId != null) {
      if (method === 'GET') sub += (sub.indexOf('?') >= 0 ? '&' : '?') + 'tripId=' + encodeURIComponent(ctx.tripId);
      else { body = body || {}; if (body.tripId == null) body.tripId = ctx.tripId; }
    }
    return new Promise(function (resolve, reject) {
      var id = 'r' + (++reqSeq);
      pending[id] = { resolve: resolve, reject: reject };
      post({ type: 'trek:invoke', requestId: id, sub: sub, method: method, body: body });
    });
  }
  function invoke(sub, method, body) {
    return new Promise(function (resolve, reject) {
      queue.push({ sub: sub, method: method, body: body, resolve: resolve, reject: reject });
      pump();
    });
  }
  function notify(level, message) { post({ type: 'trek:notify', level: level, message: message }); }
  function navigate(to) { post({ type: 'trek:navigate', to: to }); }
  // Open a URL in the host (TREK >=3.2.2). Fire-and-forget; no-ops on older hosts.
  function openExternal(url) { if (url) post({ type: 'trek:openExternal', url: String(url) }); }
  // Robust open: try a real popup first (works when the sandbox allows it), and
  // fall back to the host bridge for hosts that block popups but support it.
  function openUrl(url) {
    if (!url) return;
    var w = null;
    try { w = window.open(String(url), '_blank', 'noopener,noreferrer'); } catch (_) {}
    if (!w) openExternal(url);
  }
  function openMaps(q) { if (q) openUrl('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q)); }
  // Speak Japanese via the browser's speech engine (works inside the sandbox,
  // no network/egress). Degrades silently where no ja voice is present.
  function canSpeak() { return typeof window.speechSynthesis !== 'undefined' && typeof window.SpeechSynthesisUtterance !== 'undefined'; }
  function speak(text) {
    if (!canSpeak() || !text) return;
    try { window.speechSynthesis.cancel(); var u = new SpeechSynthesisUtterance(String(text)); u.lang = 'ja-JP'; u.rate = 0.88; window.speechSynthesis.speak(u); } catch (_) {}
  }
  // Live collaboration: the host (>=3.2.2) pushes core changes as trek:event.
  // Debounce-refresh the open tab so members see each other's edits without a

      wt('w2', 'safety', head('sun', T('Weather', 'Wetter')) + (w ? '<div class="wbig" style="font-size:34px">' + (cur.temp != null ? Math.round(cur.temp) + '°' : '—') + '</div><div class="wkick">' + esc(wcode(cur.code)) + '</div><div class="wmeta">' + (cur.humidity != null ? cur.humidity + '% · ' : '') + (cur.wind != null ? cur.wind + ' km/h' : '') + '</div>' : '<div class="wmeta" style="margin-top:0">' + T('Set a weather location in Settings.', 'Wetterort in den Einstellungen setzen.') + '</div>')),
      wt('w2', 'passport', head('grid', T('Passport', 'Passport'), vis + ' / ' + prefTot) + '<div class="wbig" style="font-size:30px">' + vis + '<small> / ' + prefTot + '</small></div>' + prefMini),
      wt('w2', 'food', head('food', T('Food tally', 'Food-Zähler')) + '<div class="wbig" style="font-size:34px">' + foodTotal + '</div><div class="wkick">' + T('items logged', 'Einträge') + '</div><div class="wmeta">' + T('konbini · ramen · kaiten …', 'Konbini · Ramen · Kaiten …') + '</div>'),
      wt('w2', 'ic', head('card', T('IC card', 'IC-Karte'), d.ic.card || '') + '<div class="wbig" style="font-size:30px' + (d.ic.low ? ';color:var(--warning)' : '') + '">' + yen(d.ic.yen != null ? d.ic.yen : 0) + '</div><div class="wkick">' + T('balance', 'Guthaben') + '</div>' + (d.ic.low ? '<div class="wmeta">' + T('below your threshold', 'unter deinem Limit') + '</div>' : '')),
      wt('w2', 'transport', head('train', T('JR Pass', 'JR Pass')) + '<div style="font-size:14px;font-weight:600;margin-bottom:4px">' + esc(jrTxt) + '</div><div class="wmeta">' + (tTrips ? tTrips + ' ' + T('legs · ', 'Strecken · ') + yen(tFare) : T('open to plan legs', 'öffnen zum Planen')) + '</div>'),
      wt('w2', 'transport', head('plane', T('Next up', 'Als Nächstes')) + (nextR ? '<div class="row" style="gap:6px;margin-bottom:2px"><span class="rt-tag">' + esc(nextR.type || 'resv') + '</span></div><div style="font-size:13.5px;font-weight:600">' + esc(nextR.title || T('Reservation', 'Reservierung')) + '</div><div class="wmeta">' + esc([nextR.from, nextR.to].filter(Boolean).join(' → ') || nextR.location || '') + '</div>' : '<div class="wmeta" style="margin-top:0">' + T('No bookings yet.', 'Noch keine Buchungen.') + '</div>')),
      wt('w2', 'countdown', head('star', T('Pinned tip', 'Angeheftet')) + (d.meta.pinned_tips ? '<div style="font-size:13.5px">' + esc(d.meta.pinned_tips) + '</div><div class="wmeta">' + (d.meta.pinned_by ? T('by ', 'von ') + esc(d.meta.pinned_by) : '') + '</div>' : '<div class="wmeta" style="margin-top:0">' + T('No pinned note yet.', 'Noch keine Notiz.') + '</div>')),
      wt('w2', 'safety', head('wave', T('Recent quake', 'Letztes Beben')) + (q0 ? '<div class="wbig" style="font-size:26px">M ' + (q0.mag != null ? q0.mag : '—') + '</div><div class="wkick">' + esc(q0.place || '') + '</div><div class="wmeta">' + esc((q0.time || '').replace('T', ' ').slice(0, 16)) + '</div>' : '<div class="wmeta" style="margin-top:0">' + T('No recent quakes.', 'Keine aktuellen Beben.') + '</div>')),
      wt('w2 h2 scroll', 'safety', head('globe', T('Latest news', 'Aktuelle News'), 'EN') + (newsItems.length ? newsItems.map(function (n) { return '<div class="wli">' + esc(n.title) + '</div>'; }).join('') : '<div class="wmeta" style="margin-top:0">' + T('News feed loads on the Safety tab.', 'News-Feed lädt im Safety-Tab.') + '</div>')),
      wt('w2', 'spots', head('pin', T('Must-see spots', 'Sehenswürdigkeiten')) + '<div class="wbig" style="font-size:30px">' + ((d.sp.spots || []).length) + '</div><div class="wkick">' + T('curated · tap to browse', 'kuratiert · antippen') + '</div>'),
      wt('w2', 'nihongo', head('book', T('Phrase of the day', 'Phrase des Tages')) + (pod ? '<div class="wjp">' + esc(pod.jp) + '</div><div class="wmeta" style="margin-top:4px">' + esc(pod.romaji) + ' · ' + esc(T(pod.en, pod.de)) + '</div>' + (SAY ? '<div style="margin-top:6px"><button class="iconbtn" data-say="' + esc(pod.jp) + '" title="' + T('Play (ja)', 'Anhören') + '">' + svg('speaker') + '</button></div>' : '') : ''))
    ];
    panel.innerHTML = '<div class="bento">' + tiles.join('') + '</div>';
    panel.querySelectorAll('.wt[data-go]').forEach(function (el) {
      var go = el.getAttribute('data-go');
      el.onclick = function () { openTab(go); };
      el.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openTab(go); } };
    });
    panel.querySelectorAll('[data-say]').forEach(function (el) {
      el.onclick = function (e) { e.stopPropagation(); speak(el.getAttribute('data-say')); };
    });
  }

  // ---- 1. Countdown & checklist -----------------------------------------
  SECTIONS.countdown = function (panel) {
    return invoke('/checklist', 'GET').then(function (d) {
      var trip = d.trip || {};
      var days = trip.days_until_start;
      var countHtml;
      if (days == null) {
        countHtml = '<div class="muted">' + T('Set a trip date in Settings, or link a TREK trip.',
          'Setze ein Reisedatum in den Einstellungen oder verknüpfe eine TREK-Reise.') + '</div>';
      } else if (days > 0) {
        countHtml = '<div class="big">' + days + '</div><div class="kicker">' + T('days to departure', 'Tage bis Abreise') + '</div>';
      } else if (days === 0) {
        countHtml = '<div class="big">' + T('Today', 'Heute') + '</div><div class="kicker">' + T('departure day', 'Abreisetag') + '</div>';
      } else if (trip.days_until_end != null && trip.days_until_end >= 0) {
        countHtml = '<div class="big">' + T('In Japan', 'In Japan') + '</div><div class="kicker">' +
          (trip.days_until_end) + ' ' + T('days left', 'Tage übrig') + '</div>';
      } else {
        countHtml = '<div class="big">お帰り</div><div class="kicker">' + T('trip complete', 'Reise beendet') + '</div>';
      }
      var srcLabel = T('this trip · shared with all members', 'diese Reise · geteilt mit allen Mitgliedern');
      var tripLine = (trip.start ? esc(trip.start) : '—') + (trip.end ? ' → ' + esc(trip.end) : '') +
        (trip.title ? ' · ' + esc(trip.title) : '');

      var groups = {};
      d.items.forEach(function (it) { (groups[it.group] = groups[it.group] || []).push(it); });
      var gnames = { docs: T('Documents', 'Dokumente'), connectivity: T('Connectivity', 'Verbindung'),
        money: T('Money', 'Geld'), gear: T('Gear', 'Ausrüstung') };
      var pct = d.total ? Math.round(d.done / d.total * 100) : 0;

      var listHtml = Object.keys(groups).map(function (g) {
        return '<div class="kicker" style="margin:12px 0 4px">' + esc(gnames[g] || g) + '</div>' +
          groups[g].map(function (it) {
            return '<div class="listrow"><span class="check' + (it.done ? ' on' : '') + '" data-id="' + esc(it.id) + '">' +
              svg('check') + '</span><span style="flex:1">' + esc(T(it.en, it.de)) +
              (it.done && it.by ? ' <span class="faint" style="font-size:11px">· ' + esc(it.by) + '</span>' : '') +
              '</span></div>';
          }).join('');
      }).join('');

      panel.innerHTML =
        '<div id="pin-banner"></div>' +
        '<div class="masonry" id="cd-cards">' +
          '<div class="card"><h2>' + svg('countdown') + T('Countdown', 'Countdown') + '</h2>' +
            countHtml +
            '<div class="divider"></div>' +
            '<div class="muted" style="font-size:12px">' + esc(tripLine) + '</div>' +
            '<div class="faint" style="font-size:11px;margin-top:2px">' + esc(srcLabel) + '</div>' +
          '</div>' +
          '<div class="card"><h2>' + svg('check') + T('Prep & packing', 'Vorbereitung & Packen') + '</h2>' +
            '<div class="between" style="margin-bottom:8px"><span class="num">' + d.done + ' / ' + d.total + '</span>' +
            '<span class="faint">' + pct + '%</span></div>' +
            '<div class="progress"><span style="width:' + pct + '%"></span></div>' +
            '<div id="checklist">' + listHtml + '</div>' +
          '</div>' +
        '</div>';

      panel.querySelectorAll('.check').forEach(function (el) {
        el.onclick = function () {
          var id = el.getAttribute('data-id');
          invoke('/checklist/toggle', 'POST', { item_id: id }).then(function () { openTab('countdown', true); })
            .catch(function (e) { notify('error', e.message); });
        };
      });
      loadTrekExtra(panel);
    });
  };

  // TREK-native integrations for the countdown tab: pinned tips (ctx.meta),
  // packing (db:read:packing), files (db:read:files), activity (events feed),
  // reservations (ctx.trips.getReservations — flights/trains/stays).
  function loadTrekExtra(panel) {
    var box = panel.querySelector('#cd-cards'); if (!box) return;
    Promise.all([
      invoke('/meta', 'GET').catch(function () { return {}; }),
      invoke('/trip/packing', 'GET').catch(function () { return { available: false, items: [] }; }),
      invoke('/trip/files', 'GET').catch(function () { return { available: false, files: [] }; }),
      invoke('/activity', 'GET').catch(function () { return { recent: [], counts: [] }; }),
      invoke('/reservations', 'GET').catch(function () { return { available: false, items: [] }; })
    ]).then(function (r) {
      var meta = r[0] || {}, pack = r[1] || {}, files = r[2] || {}, act = r[3] || {}, resv = r[4] || {};
      var pinVal = meta.pinned_tips || '';
      var pinBy = meta.pinned_by || '';
      // The shared pin renders as a prominent note at the very top of the hub so
      // every member actually sees it (the edit box below just changes it).
      function renderPinBanner(text, by) {
        var el = panel.querySelector('#pin-banner'); if (!el) return;
        if (!text) { el.innerHTML = ''; reportHeight(); return; }
        el.innerHTML = '<div class="pinnote">' + svg('star') +
          '<div class="pt"><div class="pk">' + T('Pinned tip', 'Angeheftete Notiz') + '</div>' +
          '<div class="pv">' + esc(text) + '</div>' +
          (by ? '<div class="pb">' + T('pinned by ', 'angeheftet von ') + esc(by) + '</div>' : '') +
          '</div></div>';
        reportHeight();
      }
      renderPinBanner(pinVal, pinBy);
      function na(msg) { return '<div class="faint" style="font-size:12px">' + esc(msg) + '</div>'; }
      var packHtml = pack.available
        ? ((pack.items || []).length
            ? (pack.items || []).slice(0, 40).map(function (p) { return '<div class="listrow"><span class="check' + (p.packed ? ' on' : '') + '" style="cursor:default">' + svg('check') + '</span><span style="flex:1">' + esc(p.name) + (p.bag ? ' <span class="faint" style="font-size:11px">· ' + esc(p.bag) + '</span>' : '') + '</span></div>'; }).join('')
            : na(T('No packing items in this trip yet.', 'Noch keine Packliste in dieser Reise.')))
        : na(T('Native packing list — available in a TREK 3.2.1 trip.', 'Native Packliste — in einer TREK-3.2.1-Reise verfügbar.'));
      var filesHtml = files.available
        ? ((files.files || []).length
            ? (files.files || []).slice(0, 40).map(function (f) { return '<div class="listrow"><span style="color:var(--text-faint)">' + svg('book') + '</span><span style="flex:1">' + esc(f.name) + '</span></div>'; }).join('')
            : na(T('No files uploaded to this trip yet.', 'Noch keine Dateien in dieser Reise.')))
        : na(T('Trip files — available in a TREK 3.2.1 trip.', 'Reise-Dateien — in einer TREK-3.2.1-Reise verfügbar.'));
      var actHtml = (act.counts || []).length
        ? '<div class="wrap" style="margin-bottom:8px">' + (act.counts || []).slice(0, 8).map(function (c) { return '<span class="chip static">' + esc(c.event) + ' · ' + c.n + '</span>'; }).join('') + '</div>' +
          (act.recent || []).slice(0, 10).map(function (a) { return '<div class="listrow"><span style="flex:1">' + esc(a.event) + '</span><span class="faint">' + ago(a.at) + '</span></div>'; }).join('')
        : na(T('Live feed of trip changes (places, days, files…) appears here.', 'Live-Feed der Reise-Änderungen (Orte, Tage, Dateien…) erscheint hier.'));

      function resvIcon(t) { if (/flight|plane|air/.test(t)) return 'plane'; if (/train|rail|shinkansen|jr/.test(t)) return 'train'; if (/hotel|stay|lodg|ryokan|accom|room/.test(t)) return 'bed'; return 'ticket'; }
      function resvWhen(x) { var s = x.start ? mmdd((String(x.start).slice(5,10))) : ''; var tm = /T(\d{2}:\d{2})/.exec(x.start || ''); if (tm) s += ' ' + tm[1]; if (x.end && String(x.end).slice(0,10) !== String(x.start).slice(0,10)) s += ' → ' + mmdd(String(x.end).slice(5,10)); return s; }
      var resvRows = (resv.items || []).slice(0, 12).map(function (x) {
        var route = [x.from, x.to].filter(Boolean).join(' → ') || x.location || '';
        var q = x.location || x.to || x.title || '';
        var meta2 = [resvWhen(x), route, x.ref ? ('#' + x.ref) : ''].filter(Boolean).join(' · ');
        return '<div class="resv"><span class="rt">' + esc(x.type || 'resv') + '</span>' +
          '<span style="flex:1;min-width:0"><span class="row" style="gap:6px">' + svg(resvIcon(x.type || '')) +
          '<span class="lnk" data-maps="' + esc(q) + '" style="flex:1">' + esc(x.title || T('Reservation', 'Reservierung')) + '</span></span>' +
          (meta2 ? '<div class="rd">' + esc(meta2) + '</div>' : '') + '</span></div>';
      }).join('');
      var resvHtml = resv.available
        ? ((resv.items || []).length ? resvRows : na(T('No flights, trains or stays booked in this trip yet.', 'Noch keine Flüge, Züge oder Unterkünfte in dieser Reise.')))
        : na(T('Native reservations — available in a TREK trip with bookings.', 'Native Buchungen — in einer TREK-Reise mit Reservierungen verfügbar.'));

      box.insertAdjacentHTML('beforeend',
        '<div class="card"><h2>' + svg('star') + T('Pinned tips (shared)', 'Angeheftete Tipps (geteilt)') + '</h2>' +
          '<div class="muted" style="font-size:12px;margin:-4px 0 8px">' + T('Shared with everyone on this trip — it shows at the top of the hub for all members.', 'Für alle in dieser Reise sichtbar — erscheint oben im Hub für jedes Mitglied.') + '</div>' +
          '<textarea class="fld" id="pin-text" rows="3" placeholder="' + T('e.g. Meet at Shibuya Hachiko 09:00', 'z.B. Treffpunkt Shibuya Hachiko 09:00') + '">' + esc(pinVal) + '</textarea>' +
          '<div class="row" style="margin-top:8px"><button class="btn" id="pin-save">' + T('Save pin', 'Pin speichern') + '</button>' +
          '<button class="btn sec sm" id="pin-clear">' + T('Clear', 'Löschen') + '</button></div>' +
        '</div>' +
        '<div class="card"><h2>' + svg('plane') + T('Transport & stays (from TREK)', 'Transport & Übernachtung (aus TREK)') + '</h2>' + resvHtml + '</div>' +
        '<div class="card"><h2>' + svg('countdown') + T('Live trip activity', 'Live-Reise-Aktivität') + '</h2>' + actHtml + '</div>' +
        '<div class="card"><h2>' + svg('check') + T('Trip packing (from TREK)', 'Reise-Packliste (aus TREK)') + '</h2>' + packHtml + '</div>' +
        '<div class="card"><h2>' + svg('book') + T('Trip files (from TREK)', 'Reise-Dateien (aus TREK)') + '</h2>' + filesHtml + '</div>');

      box.querySelectorAll('.lnk[data-maps]').forEach(function (el) {
        var q = el.getAttribute('data-maps'); if (!q) return;
        el.title = T('Open in Maps', 'In Karten öffnen');
        el.onclick = function () { openMaps(q); };
      });

      box.querySelector('#pin-save').onclick = function () {
        var v = box.querySelector('#pin-text').value;
        invoke('/trip/pin', 'POST', { text: v }).then(function () { notify('success', T('Pinned', 'Angeheftet')); renderPinBanner(v.trim(), (meta.me && meta.me.name) || pinBy); }).catch(function (e) { notify('error', e.message); });
      };
      box.querySelector('#pin-clear').onclick = function () {
        invoke('/trip/pin', 'POST', { text: '' }).then(function () { box.querySelector('#pin-text').value = ''; renderPinBanner('', ''); notify('info', T('Cleared', 'Gelöscht')); }).catch(function (e) { notify('error', e.message); });
      };
      reportHeight();
    });
  }

  // ---- 2. Nihongo --------------------------------------------------------
  var nihongoState = { cat: 'all', favOnly: false };
  var translatorState = { dir: 'en-ja', q: '', result: null };
  SECTIONS.nihongo = function (panel) {
    return invoke('/nihongo/state', 'GET').then(function (d) {
      sectionCache.nihongo = d;
      renderNihongo(panel, d);
    });
  };
  function renderNihongo(panel, d) {
    var favSet = {}; d.favorites.forEach(function (f) { favSet[f] = true; });
    var SAY = canSpeak();
    function sayBtn(jp) { return SAY ? '<button class="iconbtn" data-say="' + esc(jp) + '" title="' + T('Play (ja)', 'Anhören (ja)') + '">' + svg('speaker') + '</button>' : ''; }
    var pod = d.phrase_of_day;
    var cats = ['all'].concat(d.categories);
    var catChips = cats.map(function (c) {
      return '<button class="chip" data-cat="' + esc(c) + '" aria-pressed="' + (nihongoState.cat === c ? 'true' : 'false') + '">' +
        esc(c === 'all' ? T('All', 'Alle') : c) + '</button>';
    }).join('');

    var list = d.phrases.filter(function (p) {
      if (nihongoState.cat !== 'all' && p.category !== nihongoState.cat) return false;
      if (nihongoState.favOnly && !favSet[p.id]) return false;
      return true;
    });
    var rows = list.map(function (p) {
      return '<div class="listrow" style="align-items:flex-start">' +
        '<span class="check" style="border:none;background:none;width:24px" data-fav="' + esc(p.id) + '">' +
          '<span style="color:' + (favSet[p.id] ? 'var(--warning)' : 'var(--text-faint)') + '">' + svg('star') + '</span></span>' +
        '<div style="flex:1"><div><b>' + esc(p.jp) + '</b> <span class="jp">' + esc(p.romaji) + '</span></div>' +
        '<div class="muted" style="font-size:12.5px">' + esc(T(p.en, p.de)) + '</div>' +
        '<div class="faint" style="font-size:11px">' + esc(p.kana) + ' · ' + esc(p.category) + '</div></div>' +
        sayBtn(p.jp) + '</div>';
    }).join('') || '<div class="loading">' + T('No phrases match.', 'Keine Phrasen gefunden.') + '</div>';

    var DIRS = [
      { v: 'en-ja', l: 'EN → 日本語' }, { v: 'ja-en', l: '日本語 → EN' },
      { v: 'de-ja', l: 'DE → 日本語' }, { v: 'ja-de', l: '日本語 → DE' }
    ];
    var dirOpts = DIRS.map(function (o) { return '<option value="' + o.v + '"' + (translatorState.dir === o.v ? ' selected' : '') + '>' + o.l + '</option>'; }).join('');
    var targetJa = translatorState.dir.slice(-2) === 'ja';
    function translatorOut() {
      if (translatorState.result == null) return '<div class="faint" style="font-size:12px">' + T('Type a sentence and translate.', 'Satz eingeben und übersetzen.') + '</div>';
      if (translatorState.result === '') return '<div class="banner warn">' + T('Translation unavailable right now.', 'Übersetzung gerade nicht verfügbar.') + '</div>';
      return '<div class="row" style="align-items:flex-start;gap:8px"><div style="flex:1;font-size:15px">' + esc(translatorState.result) + '</div>' +
        (SAY && targetJa ? '<button class="iconbtn" data-say="' + esc(translatorState.result) + '" title="' + T('Play (ja)', 'Anhören (ja)') + '">' + svg('speaker') + '</button>' : '') + '</div>';
    }

    panel.innerHTML =
      '<div class="card"><h2>' + svg('globe') + T('Translator', 'Übersetzer') + '</h2>' +
        '<div class="row" style="gap:8px;margin-bottom:8px"><select class="fld" id="tr-dir" style="max-width:170px">' + dirOpts + '</select>' +
        '<button class="btn sm" id="tr-go">' + T('Translate', 'Übersetzen') + '</button></div>' +
        '<textarea class="fld" id="tr-in" rows="2" placeholder="' + T('Type text to translate…', 'Text zum Übersetzen…') + '">' + esc(translatorState.q) + '</textarea>' +
        '<div id="tr-out" style="margin-top:10px">' + translatorOut() + '</div>' +
        '<div class="foot">' + T('MyMemory · machine translation', 'MyMemory · maschinelle Übersetzung') + '</div>' +
      '</div>' +
      '<div class="grid cols2" style="margin-top:14px">' +
        '<div class="card"><h2>' + svg('book') + T('Phrase of the day', 'Phrase des Tages') + '</h2>' +
          '<div style="font-size:24px;font-weight:650">' + esc(pod.jp) + '</div>' +
          '<div class="jp" style="font-size:14px;margin-top:2px">' + esc(pod.romaji) + ' · ' + esc(pod.kana) + '</div>' +
          '<div style="margin-top:8px">' + esc(T(pod.en, pod.de)) + '</div>' +
          '<div class="row" style="margin-top:14px">' + sayBtn(pod.jp) + '<button class="btn sec sm" id="pod-next">' + svg('refresh') + ' ' + T('Next', 'Nächste') + '</button>' +
          '<button class="btn sm" id="pod-fav" data-fav="' + esc(pod.id) + '">' + (favSet[pod.id] ? T('Saved', 'Gespeichert') : T('Save', 'Merken')) + '</button></div>' +
        '</div>' +
        '<div class="card"><h2>' + svg('search') + T('Phrasebook', 'Phrasenbuch') + '</h2>' +
          '<div class="wrap" style="margin-bottom:8px">' + catChips + '</div>' +
          '<button class="chip" id="favonly" aria-pressed="' + (nihongoState.favOnly ? 'true' : 'false') + '">' + svg('star') + ' ' + T('Favorites', 'Favoriten') + '</button>' +
          '<div class="divider"></div>' +
          '<div style="">' + rows + '</div>' +
        '</div>' +
      '</div>';

    panel.querySelector('#pod-next').onclick = function () {
      invoke('/nihongo/next', 'POST', {}).then(function (r) { d.phrase_of_day = r.phrase_of_day; renderNihongo(panel, d); reportHeight(); });
    };

  // Result markup only — recomputed on each keystroke without touching the input
  // element itself, so the caret never jumps (fixes the "0090" typing bug).
  function taxResultHtml() {
    var amt = parseFloat(taxState.amount) || 0;
    var rate = taxState.kind === 'consumables' ? 0.08 : 0.10;
    var saving = amt > 0 ? amt * rate / (1 + rate) : 0;
    var pay = amt - saving;
    var minOk = amt >= 5000;
    var capExceeded = taxState.kind === 'consumables' && amt > 500000;
    if (amt <= 0) return '<div class="muted" style="font-size:12.5px;margin-top:6px">' + T('Enter a tax-included (zeikomi) price to see the tax-free amount.', 'Gib einen Preis inkl. Steuer (zeikomi) ein, um den steuerfreien Betrag zu sehen.') + '</div>';
    return '<div class="grid cols2" style="gap:10px;margin-top:6px">' +
        '<div class="stat"><span class="v" style="color:var(--success)">' + yen(saving) + '</span><span class="k">' + T('tax you save', 'gesparte Steuer') + '</span></div>' +
        '<div class="stat"><span class="v">' + yen(pay) + '</span><span class="k">' + T('you pay (menzei)', 'du zahlst (menzei)') + '</span></div></div>' +
      (!minOk ? '<div class="banner warn" style="margin-top:10px">' + T('Below the ¥5,000 minimum per shop per day — tax-free does not apply yet.', 'Unter dem Mindestbetrag von ¥5.000 pro Geschäft und Tag — noch keine Steuerbefreiung.') + '</div>' : '') +
      (capExceeded ? '<div class="banner warn" style="margin-top:10px">' + T('Consumables are capped at ¥500,000 per shop per day.', 'Verbrauchsgüter sind auf ¥500.000 pro Geschäft und Tag begrenzt.') + '</div>' : '');

          '<div id="tax-result">' + taxResultHtml() + '</div></div>' +
        '<div class="card"><h2>' + svg('search') + T('How it works', 'So funktioniert es') + '</h2>' +
          '<ul style="margin:0;padding-left:18px;font-size:12.5px;line-height:1.6">' +
            '<li>' + T('Minimum ¥5,000 per shop per day.', 'Mindestens ¥5.000 pro Geschäft und Tag.') + '</li>' +
            '<li>' + T('Consumables (food, drinks, cosmetics): sealed, exported within 30 days, up to ¥500,000.', 'Verbrauchsgüter (Lebensmittel, Getränke, Kosmetik): versiegelt, Ausfuhr binnen 30 Tagen, bis ¥500.000.') + '</li>' +
            '<li>' + T('Bring your passport; look for the "Tax-Free" logo at the entrance.', 'Reisepass mitnehmen; auf das "Tax-Free"-Logo am Eingang achten.') + '</li>' +
            '<li>' + T('Some shops stack discount coupons on top of the exemption.', 'Manche Geschäfte kombinieren Rabattcoupons mit der Befreiung.') + '</li></ul>' +

          '<div class="kicker" style="margin-bottom:6px">' + T('Popular tax-free shops', 'Beliebte Tax-Free-Shops') + '</div>' +
          TAXFREE_SHOPS.map(function (s) { return '<div class="listrow"><span style="flex:1"><b>' + esc(s.n) + '</b></span><span class="faint" style="font-size:11px">' + esc(s.t) + '</span></div>'; }).join('') +
        '</div>' +
      '</div>';
    panel.querySelectorAll('[data-kind]').forEach(function (b) { b.onclick = function () { taxState.kind = b.getAttribute('data-kind'); var r = panel.querySelector('#tax-result'); if (r) r.innerHTML = taxResultHtml(); panel.querySelectorAll('[data-kind]').forEach(function (x) { x.setAttribute('aria-pressed', x.getAttribute('data-kind') === taxState.kind ? 'true' : 'false'); }); reportHeight(); }; });

    var cats = ['all'].concat(et.categories);
    var chips = cats.map(function (c) {

        esc(c === 'all' ? T('All', 'Alle') : c) + '</button>';
    }).join('');

      .map(function (i) {
        return '<div style="padding:10px 0;border-top:1px solid var(--border-faint)">' +
          '<div class="between"><b>' + esc(T(i.title_en, i.title_de)) + '</b>' +
          '<span class="chip static">' + esc(i.category) + '</span></div>' +
          '<div class="muted" style="font-size:12.5px;margin-top:3px">' + esc(T(i.body_en, i.body_de)) + '</div></div>';
      }).join('');

    var gomiRows = gomi.items.map(function (g) {
      return '<tr><td><b>' + esc(T(g.item_en, g.item_de)) + '</b></td>' +

    panel.innerHTML =
      '<div class="grid cols2">' +
        '<div class="card"><h2>' + svg('culture') + T('Etiquette', 'Etikette') + '</h2>' +
          '<div class="wrap">' + chips + '</div>' + cards + '</div>' +
        '<div class="card"><h2>' + svg('search') + T('Gomi — garbage sorting', 'Gomi — Mülltrennung') + '</h2>' +
          '<input class="fld" id="gomi-q" placeholder="' + T('Search item (e.g. bottle)', 'Gegenstand suchen (z.B. Flasche)') + '" value="' + esc(cultureState.q) + '" />' +
          '<div class="scrollx" style="margin-top:10px"><table class="tbl"><thead><tr><th>' + T('Item', 'Gegenstand') + '</th><th>' + T('Bin', 'Tonne') + '</th><th>' + T('Note', 'Hinweis') + '</th></tr></thead>' +
          '<tbody>' + gomiRows + '</tbody></table></div></div>' +
      '</div>' +
      '<div class="card" style="margin-top:14px"><h2>' + svg('wave') + T('Onsen guide', 'Onsen-Guide') + '</h2>' +
        '<div class="muted" style="font-size:12.5px;margin:-4px 0 8px">' + T('Bathing etiquette so you can relax like a local.', 'Bade-Etikette, damit du entspannst wie ein Local.') + '</div>' +
        '<ol style="margin:0;padding-left:18px;font-size:12.5px;line-height:1.7">' +
          '<li>' + T('Wash and rinse thoroughly at the shower stations before entering the bath.', 'Vor dem Bad an den Duschplätzen gründlich waschen und abspülen.') + '</li>' +
          '<li>' + T('No swimsuits — you bathe nude.', 'Keine Badekleidung — man badet nackt.') + '</li>' +
          '<li>' + T('Keep the small towel out of the water (rest it on your head or the edge).', 'Das kleine Handtuch aus dem Wasser halten (auf den Kopf oder den Rand legen).') + '</li>' +
          '<li>' + T('Tie long hair up so it stays out of the water.', 'Lange Haare hochbinden, damit sie nicht ins Wasser hängen.') + '</li>' +
          '<li>' + T('Tattoos are often not allowed — look for tattoo-friendly baths or use a cover patch.', 'Tattoos sind oft nicht erlaubt — nach tattoo-freundlichen Bädern suchen oder Abdeckpflaster nutzen.') + '</li>' +
          '<li>' + T('No photos, keep your voice down, and don\'t drain or splash the bath.', 'Keine Fotos, leise sein, und das Bad nicht ablassen oder spritzen.') + '</li></ol></div>';

    panel.querySelectorAll('[data-ecat]').forEach(function (b) {
      b.onclick = function () { cultureState.cat = b.getAttribute('data-ecat'); renderCulture(panel); reportHeight(); };
    });
    var qi = panel.querySelector('#gomi-q'); var tmr;
    qi.oninput = function () {
      clearTimeout(tmr); tmr = setTimeout(function () {
        cultureState.q = qi.value;
        invoke('/gomi?q=' + encodeURIComponent(cultureState.q), 'GET').then(function (r) {
          sectionCache.culture.gomi = r; renderCulture(panel); reportHeight();
          var nq = panel.querySelector('#gomi-q'); nq.focus(); nq.setSelectionRange(nq.value.length, nq.value.length);
        });
      }, 220);
    };
  }

  // ---- 4. Budget ---------------------------------------------------------
  SECTIONS.budget = function (panel) {
    return invoke('/budget/state', 'GET').then(function (d) { renderBudget(panel, d); });
  };
  function renderBudget(panel, d) {
    var sym = d.currency_symbol;
    var overspent = d.remaining_yen < 0;
    var spendRows = (d.spends || []).map(function (s) {
      return '<tr><td class="num">' + yen(s.amount_yen) + '</td><td>' + esc(s.note || '') +
        (s.by ? ' <span class="faint" style="font-size:11px">· ' + esc(s.by) + '</span>' : '') +
        '</td><td class="faint">' + ago(s.at) + '</td></tr>';
    }).join('') || '<tr><td colspan="3" class="faint">' + T('No expenses yet', 'Noch keine Ausgaben') + '</td></tr>';
    var fxLine = d.rate != null
      ? ('1000 ¥ ≈ ' + home(1000 * d.rate, sym) + ' · ' + T('updated', 'aktualisiert') + ' ' + ago(d.fx_fetched_at))
      : T('FX rate unavailable', 'Kurs nicht verfügbar');

    panel.innerHTML =
      '<div class="grid cols2">' +
        '<div class="card"><h2>' + svg('yen') + T('Budget', 'Budget') + '</h2>' +
          '<div class="grid cols3" style="gap:10px">' +
            '<div class="stat"><span class="v">' + yen(d.planned_yen) + '</span><span class="k">' + T('planned', 'geplant') + (d.planned_home != null ? ' · ' + home(d.planned_home, sym) : '') + '</span></div>' +
            '<div class="stat"><span class="v">' + yen(d.spent_yen) + '</span><span class="k">' + T('spent', 'ausgegeben') + '</span></div>' +
            '<div class="stat"><span class="v" style="color:' + (overspent ? 'var(--danger)' : 'var(--success)') + '">' + yen(d.remaining_yen) + '</span><span class="k">' + T('remaining', 'Rest') + '</span></div>' +
          '</div>' +
          '<div class="foot">' + esc(fxLine) + '</div>' +
          '<div class="divider"></div>' +
          '<label class="lbl">' + T('Set planned budget (¥)', 'Geplantes Budget setzen (¥)') + '</label>' +
          '<div class="row"><input class="fld" id="plan" type="number" min="0" value="' + (d.planned_yen || '') + '" /><button class="btn" id="plan-save">' + T('Save', 'Speichern') + '</button></div>' +
        '</div>' +
        '<div class="card"><h2>' + svg('plus') + T('Log expense', 'Ausgabe erfassen') + '</h2>' +
          '<div class="row"><input class="fld" id="sp-amt" type="number" placeholder="¥" style="max-width:120px" />' +
          '<input class="fld" id="sp-note" placeholder="' + T('note (e.g. lunch)', 'Notiz (z.B. Mittagessen)') + '" />' +
          '<button class="btn" id="sp-add">' + svg('plus') + '</button></div>' +
          '<div class="scrollx" style="margin-top:12px;"><table class="tbl"><thead><tr><th>' + T('Amount', 'Betrag') + '</th><th>' + T('Note', 'Notiz') + '</th><th></th></tr></thead><tbody>' + spendRows + '</tbody></table></div>' +
        '</div>' +
      '</div>' +
      '<div class="card" style="margin-top:14px" id="costs-card"><h2>' + svg('yen') + T('TREK budget (Costs addon)', 'TREK-Budget (Costs-Addon)') + '</h2>' +
        '<div class="loading"><span class="spinner"></span></div></div>';

    panel.querySelector('#plan-save').onclick = function () {

      });

    panel.querySelector('#sp-add').onclick = function () {

      invoke('/budget/spend', 'POST', { amount_yen: amt, note: panel.querySelector('#sp-note').value }).then(function () { openTab('budget', true); });
    };
    loadCosts(panel);
  }

  // Native TREK budget items (Costs addon): list / add / delete / sync.
  function loadCosts(panel) {
    var card = panel.querySelector('#costs-card'); if (!card) return;
    invoke('/costs', 'GET').catch(function () { return { available: false }; }).then(function (c) {
      var body;
      if (!c.available) {
        body = '<div class="banner warn">' + T('The Costs (budget) addon is not enabled on this trip, or your host is pre-3.2.1. Enable it in TREK to push expenses into the native budget.', 'Das Costs-(Budget-)Addon ist für diese Reise nicht aktiviert oder der Host ist älter als 3.2.1. Aktiviere es in TREK, um Ausgaben ins native Budget zu übertragen.') + '</div>';
      } else {
        var rows = (c.items || []).map(function (it) {
          return '<tr><td>' + esc(it.name) + '</td><td class="num">' + (it.amount != null ? '¥' + Math.round(it.amount).toLocaleString('en-US') : '<span class="faint">—</span>') + '</td>' +
            '<td style="text-align:right"><button class="btn sec sm cost-del" data-id="' + esc(String(it.id)) + '">' + T('Remove', 'Entfernen') + '</button></td></tr>';
        }).join('') || '<tr><td colspan="3" class="faint">' + T('No native budget items yet', 'Noch keine nativen Budget-Posten') + '</td></tr>';
        body =
          '<div class="muted" style="font-size:12.5px;margin:-4px 0 10px">' + T('Real TREK budget items via ctx.costs — shared with the trip’s Costs tab.', 'Echte TREK-Budget-Posten über ctx.costs — geteilt mit dem Costs-Tab der Reise.') + '</div>' +
          '<div class="row" style="margin-bottom:10px"><input class="fld" id="cost-name" placeholder="' + T('name (e.g. Ryokan)', 'Name (z.B. Ryokan)') + '" /><input class="fld" id="cost-amt" type="number" min="0" placeholder="¥" style="max-width:130px" />' +
          '<button class="btn" id="cost-add">' + T('Add', 'Hinzufügen') + '</button>' +
          '<button class="btn sec" id="cost-sync">' + T('Sync all expenses', 'Alle Ausgaben übertragen') + '</button></div>' +
          '<div class="scrollx"><table class="tbl"><thead><tr><th>' + T('Name', 'Name') + '</th><th>' + T('Amount', 'Betrag') + '</th><th></th></tr></thead><tbody>' + rows + '</tbody></table></div>';
      }
      card.innerHTML = '<h2>' + svg('yen') + T('TREK budget (Costs addon)', 'TREK-Budget (Costs-Addon)') + '</h2>' + body;
      var add = card.querySelector('#cost-add');
      if (add) add.onclick = function () {
        var name = card.querySelector('#cost-name').value, amt = card.querySelector('#cost-amt').value;
        if (!name) return notify('warning', T('Enter a name', 'Name eingeben'));
        if (!amt || Number(amt) <= 0) return notify('warning', T('Enter an amount in ¥', 'Betrag in ¥ eingeben'));
        add.disabled = true;
        invoke('/costs/add', 'POST', { name: name, amount: amt }).then(function () { loadCosts(panel); }).catch(function (e) { add.disabled = false; notify('error', e.message); });
      };
      var sync = card.querySelector('#cost-sync');
      if (sync) sync.onclick = function () {
        invoke('/costs/sync', 'POST', {}).then(function (r) { notify('success', (r.created || 0) + ' ' + T('added to trip budget', 'ins Reise-Budget übertragen')); loadCosts(panel); }).catch(function (e) { notify('error', e.message); });
      };
      card.querySelectorAll('.cost-del').forEach(function (b) {
        b.onclick = function () { invoke('/costs/delete', 'POST', { itemId: b.getAttribute('data-id') }).then(function () { loadCosts(panel); }).catch(function (e) { notify('error', e.message); }); };
      });
      reportHeight();
    });
  }
