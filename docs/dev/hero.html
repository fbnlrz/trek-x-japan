<!doctype html>
<!-- SCREENSHOT HERO ONLY — deleted before pack. 1600x900 store card: the hub in
     light + dark, opened on the prefecture passport, with title band + pills. -->
<html lang="en">
<head><meta charset="utf-8" /><title>TREK × Japan — hero</title>
<style>
  :root { --accent: #d1495b; --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    width: 1600px; height: 900px; overflow: hidden; font-family: var(--font);
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(1300px 640px at 50% -12%, color-mix(in srgb, var(--accent) 26%, #fff), transparent 60%),
      linear-gradient(160deg, #fbf5f6 0%, #eef0f6 55%, #e7e9f2 100%);
  }
  .safe { width: 1180px; text-align: center; }
  .brandrow { display: inline-flex; align-items: center; gap: 12px; }
  .brandrow svg { width: 34px; height: 34px; color: #111827; }
  .title { font-size: 36px; font-weight: 750; color: #111827; letter-spacing: -0.02em; }
  .tagline { margin-top: 10px; font-size: 16px; font-weight: 500; color: #52525b; }
  .cards { margin-top: 30px; display: flex; gap: 30px; justify-content: center; }
  .win { width: 540px; height: 588px; border-radius: 20px; overflow: hidden;
    box-shadow: 0 18px 50px rgba(17,24,39,.18), 0 3px 10px rgba(0,0,0,.06); }
  .win.light { border: 1px solid rgba(0,0,0,.06); background: #f6f6f7; }
  .win.dark  { border: 1px solid rgba(255,255,255,.08); background: #0d0d10; }
  .win iframe { display: block; width: 100%; height: 1400px; border: 0; }
  .pills { margin-top: 28px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .pill { padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 600; color: #374151;
    background: rgba(255,255,255,.6); border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent); }
</style></head>
<body>
  <div class="safe">
    <div class="brandrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polygon points="16.2 7.8 13.4 13.4 7.8 16.2 10.6 10.6 16.2 7.8"/></svg>
      <span class="title">TREK × Japan</span>
    </div>
    <div class="tagline">One hub for a Japan trip — countdown, phrasebook, budget, IC card, food passport, season &amp; safety.</div>
    <div class="cards">
      <div class="win light"><iframe src="/ui/harness.html?tab=passport&theme=light"></iframe></div>
      <div class="win dark"><iframe src="/ui/harness.html?tab=passport&theme=dark"></iframe></div>
    </div>
    <div class="pills">
      <span class="pill">9 sections</span>
      <span class="pill">Light &amp; dark</span>
      <span class="pill">EN / DE</span>
      <span class="pill">Live FX · weather · quakes</span>
    </div>
  </div>
</body></html>
